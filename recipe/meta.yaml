{% set version = "0.1-55" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-slam
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/slam_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/slam/slam_{{ version }}.tar.gz
  sha256: 0fb8450d002ba79855063300941e830133a1880011d926e644aa639dbde91c03

build:
  number: 2
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('m2w64_c') }}  # [win]
    - {{ stdlib("m2w64_c") }}    # [win]
    - {{ compiler("fortran") }}
    - {{ posix }}filesystem      # [win]
    - {{ posix }}make
    - {{ posix }}sed             # [win]
    - {{ posix }}coreutils       # [win]
    - {{ posix }}zip             # [win]
  host:
    - r-base
    - libblas
  run:
    - r-base

test:
  commands:
    - $R -e "library('slam')"           # [not win]
    - "\"%R%\" -e \"library('slam')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=slam
  dev_url: https://github.com/cran/slam
  license: GPL-2.0-only
  summary: Data structures and algorithms for sparse arrays and matrices, based on index arrays and simple triplet representations, respectively.
  license_family: GPL2
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2

extra:
  recipe-maintainers:
    - conda-forge/r
    - croth1
